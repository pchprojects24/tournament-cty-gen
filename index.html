<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Tournament Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-mode">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="trophy-icon">🏆</span>
        <h1>Tournament Generator</h1>
      </div>
      <div class="header-actions">
        <button id="btn-dark-mode" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <button id="btn-print" class="icon-btn" title="Print bracket" aria-label="Print bracket">🖨️</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="app-main">

    <!-- ===== SECTION 1: TOURNAMENT SETUP ===== -->
    <section class="card" id="section-setup">
      <h2 class="section-title">Tournament Setup</h2>

      <!-- Tournament Name -->
      <div class="form-group">
        <label for="tournament-name">Tournament Name</label>
        <input type="text" id="tournament-name" placeholder="e.g. Summer Championship 2026" autocomplete="off" />
      </div>

      <!-- Tournament Type -->
      <div class="form-group">
        <label>Tournament Type</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="tournament-type" value="single-elimination" checked />
            <span class="radio-custom"></span>
            Single Elimination
          </label>
          <label class="radio-label">
            <input type="radio" name="tournament-type" value="round-robin" />
            <span class="radio-custom"></span>
            Round Robin
          </label>
        </div>
      </div>

      <!-- Player Management -->
      <div class="form-group">
        <label for="player-input">Add Players / Teams</label>
        <div class="input-row">
          <input type="text" id="player-input" placeholder="Player or team name" autocomplete="off" />
          <button id="btn-add-player" class="btn btn-primary">Add</button>
        </div>
        <textarea id="paste-input" placeholder="Paste multiple names here (one per line), then click Import" rows="3"></textarea>
        <button id="btn-paste-import" class="btn btn-secondary btn-full">Import from Paste</button>
      </div>

      <!-- Player List -->
      <div class="form-group" id="player-list-section">
        <div class="player-list-header">
          <label>Players <span id="player-count" class="badge">0</span></label>
          <div class="player-list-actions">
            <button id="btn-randomize" class="btn btn-sm btn-secondary" title="Randomize order">🔀 Randomize</button>
            <button id="btn-clear-players" class="btn btn-sm btn-danger" title="Clear all players">🗑️ Clear All</button>
          </div>
        </div>
        <ul id="player-list" class="player-list">
          <li class="empty-state">No players added yet.</li>
        </ul>
      </div>

      <!-- Generate Button -->
      <div class="form-group">
        <button id="btn-generate" class="btn btn-primary btn-full btn-large">Generate Tournament</button>
      </div>
    </section>

    <!-- ===== SECTION 2: BRACKET / SCHEDULE ===== -->
    <section class="card" id="section-bracket" style="display:none;">
      <div class="bracket-header">
        <div>
          <h2 class="section-title" id="bracket-title">Bracket</h2>
          <p class="bracket-meta" id="bracket-meta"></p>
        </div>
        <div class="bracket-controls">
          <button id="btn-reset" class="btn btn-sm btn-danger">↺ Reset</button>
          <button id="btn-save" class="btn btn-sm btn-primary">💾 Save</button>
        </div>
      </div>

      <!-- Single Elimination Bracket -->
      <div id="single-elim-container" style="display:none;">
        <div id="bracket-rounds" class="bracket-rounds"></div>
      </div>

      <!-- Round Robin Schedule + Standings -->
      <div id="round-robin-container" style="display:none;">
        <div class="rr-tabs">
          <button class="rr-tab active" data-tab="schedule">Schedule</button>
          <button class="rr-tab" data-tab="standings">Standings</button>
        </div>
        <div id="rr-schedule" class="rr-panel active"></div>
        <div id="rr-standings" class="rr-panel"></div>
      </div>
    </section>

    <!-- ===== SECTION 3: CONTROLS & SAVED TOURNAMENTS ===== -->
    <section class="card" id="section-saved">
      <h2 class="section-title">Saved Tournaments</h2>
      <div class="saved-controls">
        <button id="btn-export" class="btn btn-secondary">⬇ Export JSON</button>
        <label class="btn btn-secondary" for="btn-import-file">⬆ Import JSON</label>
        <input type="file" id="btn-import-file" accept=".json" style="display:none;" />
      </div>
      <div id="saved-list" class="saved-list">
        <p class="empty-state">No saved tournaments.</p>
      </div>
    </section>

  </main>

  <!-- ===== MATCH MODAL ===== -->
  <div id="match-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Match Result</h3>
        <button id="modal-close" class="icon-btn" aria-label="Close modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="match-teams">
          <div class="match-team" id="modal-team1">
            <span class="team-name" id="modal-team1-name">Team 1</span>
            <input type="number" id="modal-score1" class="score-input" min="0" placeholder="0" />
          </div>
          <div class="match-vs">VS</div>
          <div class="match-team" id="modal-team2">
            <span class="team-name" id="modal-team2-name">Team 2</span>
            <input type="number" id="modal-score2" class="score-input" min="0" placeholder="0" />
          </div>
        </div>
        <div class="winner-select">
          <label>Winner</label>
          <div class="winner-btns">
            <button id="modal-win1" class="btn btn-winner" data-side="1"></button>
            <button id="modal-win2" class="btn btn-winner" data-side="2"></button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-save" class="btn btn-primary btn-full">Save Result</button>
        <button id="modal-clear" class="btn btn-secondary btn-full">Clear Result</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
